$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "secret123",
      "confirmPassword": "secret123",
      "rolId": 1
    }

$kind: http-request
name: POST /register
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "user@example.com",
      "password": "password123",
      "confirmPassword": "password123",
      "rolId": 1
    }
